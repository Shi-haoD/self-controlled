version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: self_postgres
    restart: always
    environment:
      POSTGRES_DB: work_management
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/database_ddl.sql:/docker-entrypoint-initdb.d/01-init.sql
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - self_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: self_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/work_management
      JWT_SECRET: your-super-secret-key-change-in-production
      JWT_EXPIRE_MINUTES: "1440"
      APP_ENV: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: WARNING
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - self_network
    command: >
      sh -c "cd /app/sql && python init_database.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: self_frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_GLOB_API_URL: http://localhost:8000/api/v1
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - self_network

volumes:
  postgres_data:
    driver: local

networks:
  self_network:
    driver: bridge
